[workspace]
name = "treeffuser"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.10,<3.13"
pip = "*"
numpy = "*"
jaxtyping = "*"
einops = "*"
scipy = "*"
tqdm = "*"
lightgbm = "*"
ml-collections = "*"
scikit-learn = "*"
pandas = "*"
hatchling = "*"

[pypi-dependencies]
treeffuser = { path = ".", editable = true }

[tasks]
setup = "pre-commit install"
test = "pytest"
lint = "pre-commit run --all-files"
bench-smoke = "python -m benchmarks.run --config benchmarks/configs/smoke.yaml"
bench-real = "python -m benchmarks.run --config benchmarks/configs/real_smoke.yaml"
clean-pixi = "rm -rf .pixi pixi.lock"

[feature.test.dependencies]
pytest = ">=8.2"
pytest-cov = "*"
tox = "*"

[feature.test.tasks]
test-coverage = "pytest --cov=treeffuser --cov-report=term-missing --cov-report=xml tests"
tox = "tox"

[feature.lint.dependencies]
pre-commit = "*"
ruff = "*"
black = "*"
autoflake = "*"
pre-commit-hooks = "*"
ty = "*"

[feature.lint.tasks]
pre-commit-install = "pre-commit install"
ruff = "ruff check src tests benchmarks"

[feature.bench.dependencies]
pyyaml = "*"

[feature.bench.tasks]
bench-smoke = "python -m benchmarks.run --config benchmarks/configs/smoke.yaml"
bench-synthetic = "python -m benchmarks.run --config benchmarks/configs/synthetic_core.yaml"
bench-real = "python -m benchmarks.run --config benchmarks/configs/real_smoke.yaml"

[feature.build.dependencies]
python-build = "*"
twine = "*"

[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[environments]
default = ["test", "lint", "bench"]
test = ["test"]
lint = ["lint"]
bench = ["bench", "test"]
build = ["build"]
py310 = ["py310", "test"]
py311 = ["py311", "test"]
py312 = ["py312", "test"]
