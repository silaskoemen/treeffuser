# Flow-path ablation: do non-linear paths (trig, VP) close the |covE|@95 gap that
# the linear-FM stochasticity-schedule sweep could not? The schedule-shape diagnostic
# showed (a) quadratic eps(t) helps tails but (b) no schedule flattens the
# tail-vs-bulk deficit ratio under linear FM, suggesting the residual gap is
# structural — likely the linear path's constant-in-t target gives too little
# per-t signal at extreme (high-IQR) test points. Hypothesis: trig (variance-
# preserving, smooth t-varying target) and VP (variance-preserving, DDPM-style
# linear-beta schedule) provide richer per-t signal and may close the gap.
#
# Cross with the three schedule shapes most informative from the prior sweep:
# linear (current default), quadratic (best tail behaviour), sqrt (control,
# concentrates noise near data — known weak under linear FM).
#
# Reference: score winning combo at n_steps=25. FM variants: linear,
# trig, and VP residualized-mean variants, all at stochasticity=1.0 (the
# established sweet spot from the prior sweep). One step count (25) to keep
# sweep size manageable; step-count interaction was already characterised.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300

variants:
  - name: residualized_mean_edm_logsigma_resC
    params:
      training_objective: score
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      sde_hyperparam_min: 0.01
      sde_hyperparam_max: 20.0
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: linear_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
  - name: trig_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: trig
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
  - name: vp_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1

samplers:
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: true
    variants: [residualized_mean_edm_logsigma_resC]

  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: quadratic
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: sqrt
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time
