# Path × {ODE, SDE} ablation. Disentangles the path effect from the stochasticity
# effect on the |covE|@95 win. Four hypotheses to discriminate:
#   H1: trig/vp @95 win comes from the path. Then trig/vp at ODE should already
#       beat linear at ODE on @95.
#   H2: trig/vp @95 win comes from stochasticity. Then trig/vp at ODE should look
#       like linear at ODE; the gap appears only with SDE.
#   H3: path-stoch interaction. Trig/vp + SDE > trig/vp + ODE > linear + SDE >
#       linear + ODE on @95, with non-additive gains.
#   H4: paths matter for ODE-step efficiency but not coverage. ODE step-count
#       convergence differs across paths.
#
# To answer all of these, sweep:
#   3 paths × ODE @ n_steps ∈ {5, 10, 25}   (ODE step efficiency per path)
#   3 paths × SDE-linear @ n_steps = 25     (the established SDE comparator)
# plus the score winning combo at n_steps=25 as reference.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300

variants:
  - name: residualized_mean_edm_logsigma_resC
    params:
      training_objective: score
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      sde_hyperparam_min: 0.01
      sde_hyperparam_max: 20.0
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: linear_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
  - name: trig_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: trig
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
  - name: vp_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1

samplers:
  # Score reference at converged step count.
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: true
    variants: [residualized_mean_edm_logsigma_resC]

  # FM ODE (stochasticity = 0). Schedule shape is irrelevant when stoch=0.
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    velocity_stochasticity_schedule: linear
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time
  - n_samples: 200
    n_steps: 10
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    velocity_stochasticity_schedule: linear
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    velocity_stochasticity_schedule: linear
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time

  # FM SDE (the established comparator: stoch=1.0, schedule=linear).
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants:
      - linear_fm_residualized_mean_raw_time
      - trig_fm_residualized_mean_raw_time
      - vp_fm_residualized_mean_raw_time
