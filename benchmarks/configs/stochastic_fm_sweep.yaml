# Stochastic-interpolant FM sweep. Tests whether nonzero `velocity_stochasticity`
# closes the marginal-metric coverage gap to the score winning combo while
# preserving FM's few-step sampling advantage as a tuning knob. The stochasticity
# schedule is ε(t) = velocity_stochasticity * t (vanishes at the data endpoint).
#
# Reference variant: `residualized_mean_edm_logsigma_resC` — the current strongest
# deterministic score path. FM variant: `linear_fm_residualized_mean_raw_time`,
# the best linear-FM variant from the 2026-05-13 FM sweep, swept across four
# stochasticity values and four step counts.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300

variants:
  - name: residualized_mean_edm_logsigma_resC
    params:
      training_objective: score
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      sde_hyperparam_min: 0.01
      sde_hyperparam_max: 20.0
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: linear_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1

samplers:
  # Score reference at converged step count.
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: true
    variants: [residualized_mean_edm_logsigma_resC]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: true
    variants: [residualized_mean_edm_logsigma_resC]

  # FM deterministic baseline.
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 10
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    variants: [linear_fm_residualized_mean_raw_time]

  # FM stochastic, low strength.
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.25
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 10
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.25
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.25
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.25
    variants: [linear_fm_residualized_mean_raw_time]

  # FM stochastic, medium strength.
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.5
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 10
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.5
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.5
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.5
    variants: [linear_fm_residualized_mean_raw_time]

  # FM stochastic, high strength.
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 10
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    variants: [linear_fm_residualized_mean_raw_time]
