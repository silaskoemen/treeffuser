# Full-data conditional-tail calibration diagnostic for Appendix J.
#
# This closes the earlier evidence gap where stochastic FM rows came from
# reduced-row sweeps. The matching deterministic ODE rows are already in
# paper_real_data_v2_full.jsonl; this config runs only the missing stochastic
# C/E variants on the two large full-data splits.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: california_housing
    n_train: 18576
    n_test: 2064
  - name: protein
    n_train: 41157
    n_test: 4573

variants:
  - name: vp_fm_sde_resid_C
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: vp_fm_sde_sqrt_resid_C
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: vp_fm_sde_resid_E
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 2000
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
        early_stopping_rounds: 30
  - name: vp_fm_sde_sqrt_resid_E
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 2000
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
        early_stopping_rounds: 30

samplers:
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants:
      - vp_fm_sde_resid_C
      - vp_fm_sde_resid_E
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: sqrt
    variants:
      - vp_fm_sde_sqrt_resid_C
      - vp_fm_sde_sqrt_resid_E
