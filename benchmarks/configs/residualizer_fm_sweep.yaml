samplers:
  # linear_fm_sde sampler: Heun SDE, stoch=1.0, schedule=linear, n_steps=25
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants:
      - linear_fm_sde_resid_A
      - linear_fm_sde_resid_B
      - linear_fm_sde_resid_C
      - linear_fm_sde_resid_D
      - linear_fm_sde_resid_E

  # vp_fm_ode sampler: Heun ODE @ 5 steps
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    velocity_stochasticity_schedule: linear
    variants:
      - vp_fm_ode_resid_A
      - vp_fm_ode_resid_B
      - vp_fm_ode_resid_C
      - vp_fm_ode_resid_D
      - vp_fm_ode_resid_E

  # vp_fm_sde (linear schedule) sampler: Heun SDE, stoch=1.0, schedule=linear, n_steps=25
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants:
      - vp_fm_sde_resid_A
      - vp_fm_sde_resid_B
      - vp_fm_sde_resid_C
      - vp_fm_sde_resid_D
      - vp_fm_sde_resid_E

  # vp_fm_sde_sqrt sampler: Heun SDE, stoch=1.0, schedule=sqrt, n_steps=25
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: sqrt
    variants:
      - vp_fm_sde_sqrt_resid_A
      - vp_fm_sde_sqrt_resid_B
      - vp_fm_sde_sqrt_resid_C
      - vp_fm_sde_sqrt_resid_D
      - vp_fm_sde_sqrt_resid_E
