# Residualizer A-E sweep on the four candidate FM Pareto-frontier operating
# points. Mirrors the score-side residualizer_sweep + residualizer_es_sweep
# setup: A (current defaults), B (regularized for small n), C (high-capacity),
# D (early-stopped moderate), E (early-stopped high-cap). The score-side
# conclusion was that C wins on real data and D self-tunes via early stopping;
# this sweep tests whether the same ranking transfers to FM, and whether the
# residual CRPS gap to treeffuser_score_combo closes when FM gets the same
# residualizer treatment.
#
# Includes a fourth FM operating point (vp_fm_sde_sqrt) that was the CRPS
# winner in the prior flow_path_sweep on small real data but has not been
# validated on the canonical UCI suite. This sweep tells us whether to
# promote it to a paper-grade operating point or drop it.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: diabetes
    n_train: 400
    n_test: 42
  - name: energy
    n_train: 691
    n_test: 77
  - name: california_housing
    n_train: 8000
    n_test: 2000
  - name: protein
    n_train: 5000
    n_test: 1500

variants:
  # ============= linear_fm_sde × residualizer A-E =============
  - name: linear_fm_sde_resid_A
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
  - name: linear_fm_sde_resid_B
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 500
        learning_rate: 0.05
        max_depth: 4
        num_leaves: 15
        min_child_samples: 40
  - name: linear_fm_sde_resid_C
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
