      verbose: -1
      extra_residualizer_params:
        n_estimators: 2000
        learning_rate: 0.05
        max_depth: 6
        num_leaves: 31
        min_child_samples: 20
        early_stopping_rounds: 30
  - name: linear_fm_sde_resid_E
    params:
      training_objective: flow_matching
