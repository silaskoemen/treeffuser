# Selected external probabilistic baselines for the final paper comparison.
# Generated by benchmarks/select_probabilistic_baseline_hyperparams.py.
# Do not edit selected parameters by hand; rerun the selection script from
# completed hyperparameter-selection JSONL files if the protocol changes.
# This config intentionally excludes Treeffuser and should be joined with
# the already completed paper_real_data_v2 results.

seeds:
  - 0
  - 1
  - 2
seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000
datasets:
  - name: yacht
    n_train: 277
    n_test: 31
  - name: concrete
    n_train: 927
    n_test: 103
  - name: energy
    n_train: 691
    n_test: 77
  - name: diabetes
    n_train: 400
    n_test: 42
  - name: wine
    n_train: 5847
    n_test: 650
  - name: kin8nm
    n_train: 7372
    n_test: 820
  - name: power_plant
    n_train: 8611
    n_test: 957
  - name: naval
    n_train: 10741
    n_test: 1193
  - name: california_housing
    n_train: 18576
    n_test: 2064
  - name: protein
    n_train: 41157
    n_test: 4573
variants:
  - name: card_selected
    model: card
    params:
      max_epochs: 150
      diffusion_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      dropout: 0.01
      sample_batch_size: 4096
      hidden_size: 100
      n_layers: 1
      n_steps: 50
  - name: catboost_uncertainty_selected
    model: catboost_uncertainty
    params:
      iterations: 3000
      early_stopping_rounds: 50
      thread_count: -1
      learning_rate: 0.05
      depth: 4
  - name: deep_ensemble_selected
    model: deep_ensemble
    params:
      max_epochs: 150
      learning_rate: 0.001
      batch_size: 256
      patience: 15
      n_ensembles: 5
      hidden_size: 50
      n_layers: 1
  - name: ibug_selected
    model: ibug
    params:
      learning_rate: 0.05
      leaf_sample_trees: 64
      k: 100
      n_estimators: 300
      max_depth: 3
  - name: ngboost_selected
    model: ngboost
    params:
      early_stopping_rounds: 50
      n_estimators: 3000
      learning_rate: 0.02
  - name: qreg_lightgbm_selected
    model: qreg_lightgbm
    params:
      n_estimators: 500
      min_child_samples: 20
      n_jobs: -1
      early_stopping_rounds: 30
      quantile_count: 31
      learning_rate: 0.1
      num_leaves: 31
samplers:
  - n_samples: 200
    n_steps: 1
    n_parallel: 200
    method: euler
    pf_ode: false
    variants:
      - card_selected
      - catboost_uncertainty_selected
      - deep_ensemble_selected
      - ibug_selected
      - ngboost_selected
      - qreg_lightgbm_selected
