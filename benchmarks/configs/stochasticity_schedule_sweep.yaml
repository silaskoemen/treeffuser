# Stochasticity-schedule shape sweep on stochastic-interpolant FM. The 2026-05-13
# stochastic-FM diagnostic showed the |covE|@95 gap vs score is tail-concentrated:
# FM's @95 deficit grows nearly 2x from easy- to hard-IQR bin while score is
# uniform. The hypothesis: a schedule that injects MORE noise at high t (where
# samples are near prior and need to spread to reach the data tail) should
# selectively close the gap without over-broadening easy points. Tested
# candidates against linear (current default):
#   linear     eps(t) = c * t          (monotone, current default)
#   quadratic  eps(t) = c * t^2        (more aggressive high-t concentration)
#   sqrt       eps(t) = c * sqrt(t)    (less aggressive vanishing near data; control)
#   tent       eps(t) = c * t * (1-t)  (peaks at t=0.5; control for "mid-path noise
#                                       does not help tails" hypothesis)
#
# Reference: score winning combo at n_steps=25 (same as stochastic_fm_sweep).
# FM variant: linear_fm_residualized_mean_raw_time (same as stochastic_fm_sweep).
# Stochasticity values: 1.0 (matched to prior sweep) + 2.0 (test if going further
# under a chosen schedule helps where flat-scaling on the linear schedule did not).

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: heteroscedastic_gaussian_linear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: heteroscedastic_gaussian_nonlinear
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: student_t_heavy_tail
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: bimodal_mixture
    n_train: 1000
    n_test: 1000
    x_dim: 3
  - name: diabetes
    n_train: 300
    n_test: 142
  - name: california_housing
    n_train: 500
    n_test: 300
  - name: kin8nm
    n_train: 500
    n_test: 300
  - name: wine_quality_white
    n_train: 500
    n_test: 300

variants:
  - name: residualized_mean_edm_logsigma_resC
    params:
      training_objective: score
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      sde_hyperparam_min: 0.01
      sde_hyperparam_max: 20.0
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: linear_fm_residualized_mean_raw_time
    params:
      training_objective: flow_matching
      flow_path: linear
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1

samplers:
  # Score reference: best deterministic score @ converged step count.
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: true
    variants: [residualized_mean_edm_logsigma_resC]

  # FM with each schedule shape, at stoch=1.0 and 2.0, n_steps in {15, 25}.
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: linear
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: linear
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: linear
    variants: [linear_fm_residualized_mean_raw_time]

  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: quadratic
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: quadratic
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: quadratic
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: quadratic
    variants: [linear_fm_residualized_mean_raw_time]

  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: sqrt
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: sqrt
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: sqrt
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: sqrt
    variants: [linear_fm_residualized_mean_raw_time]

  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: tent
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 1.0
    velocity_stochasticity_schedule: tent
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 15
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: tent
    variants: [linear_fm_residualized_mean_raw_time]
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 2.0
    velocity_stochasticity_schedule: tent
    variants: [linear_fm_residualized_mean_raw_time]
