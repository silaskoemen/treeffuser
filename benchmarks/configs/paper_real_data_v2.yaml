# Paper-grade real-data comparison (v2). Replaces paper_real_data.yaml with the
# residualizer-optimal FM variants from the residualizer_fm_sweep finding:
# vp_fm_ode with residualizer-C (latency + CRPSS corner) and residualizer-E
# (calibration corner). Drops linear_fm_sde, vp_fm_sde, vp_fm_sde_sqrt — the
# residualizer ablation showed they are dominated by vp_fm_ode under the right
# residualizer config.
#
# Four variants, same 10 datasets × 3 seeds as v1.

seeds: [0, 1, 2]

seed_policy:
  data_seed_offset: 0
  model_seed_offset: 10000
  sampler_seed_offset: 20000

datasets:
  - name: yacht
    n_train: 277
    n_test: 31
  - name: concrete
    n_train: 927
    n_test: 103
  - name: energy
    n_train: 691
    n_test: 77
  - name: diabetes
    n_train: 400
    n_test: 42
  - name: wine
    n_train: 5847
    n_test: 650
  - name: kin8nm
    n_train: 5000
    n_test: 1000
  - name: power_plant
    n_train: 8611
    n_test: 957
  - name: naval
    n_train: 10741
    n_test: 1193
  - name: california_housing
    n_train: 8000
    n_test: 2000
  - name: protein
    n_train: 5000
    n_test: 1500

variants:
  - name: treeffuser_published
    params:
      training_objective: score
      score_parameterization: noise
      noise_features: raw_time
      t_sampling: uniform
      residualize: "off"
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      verbose: -1
  - name: treeffuser_score_combo
    params:
      training_objective: score
      score_parameterization: edm
      noise_features: raw_time_log_std
      residualize: mean
      residualize_k_folds: 5
      t_sampling: log_sigma_normal
      log_sigma_p_mean: -1.2
      log_sigma_p_std: 1.2
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      sde_name: vesde
      sde_hyperparam_min: 0.01
      sde_hyperparam_max: 20.0
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: vp_fm_ode_resid_C
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 300
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
  - name: vp_fm_ode_resid_E
    params:
      training_objective: flow_matching
      flow_path: vp
      noise_features: raw_time
      residualize: mean
      residualize_k_folds: 5
      n_repeats: 30
      n_estimators: 3000
      early_stopping_rounds: 50
      learning_rate: 0.1
      verbose: -1
      extra_residualizer_params:
        n_estimators: 2000
        learning_rate: 0.05
        max_depth: -1
        num_leaves: 63
        min_child_samples: 10
        early_stopping_rounds: 30

samplers:
  # treeffuser_published: original Euler reverse-SDE @ 50 steps.
  - n_samples: 200
    n_steps: 50
    n_parallel: 20
    method: euler
    pf_ode: false
    variants: [treeffuser_published]

  # treeffuser_score_combo: Heun PF-ODE @ 25 steps.
  - n_samples: 200
    n_steps: 25
    n_parallel: 20
    method: heun
    pf_ode: true
    variants: [treeffuser_score_combo]

  # vp_fm_ode + resid_C and resid_E: Heun ODE @ 5 steps.
  - n_samples: 200
    n_steps: 5
    n_parallel: 20
    method: heun
    pf_ode: false
    velocity_stochasticity: 0.0
    velocity_stochasticity_schedule: linear
    variants:
      - vp_fm_ode_resid_C
      - vp_fm_ode_resid_E
